<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>mesh - Go ervice toolkit</title>
  <meta name="description" content="A Go toolkit for building production-grade services">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="favicon.ico" type="image/x-icon">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Exo+2:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Rajdhani:wght@500;600;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/dark.css">
  <style>
    :root {
      --theme-color: #38bdf8;
      /* Softer, highly readable cyan-blue */
      --theme-color-dark: #0ea5e9;
      --theme-color-light: rgba(56, 189, 248, 0.15);
      --heading-color: #f8fafc;
      --text-color: #e2e8f0;
      /* Brighter body text (gray-200) for better contrast */
      --text-muted: #94a3b8;
      --bg-color: #0f111a;
      /* Slightly lighter deep blue-black for better eye comfort */
      --sidebar-width: 280px;
      --code-bg: #1e2430;
      /* Lighter than pitch black to reduce high contrast strain */
      --code-fg: #e2e8f0;
      --border-color: rgba(56, 189, 248, 0.2);
      --success-color: #34d399;
      --warning-color: #fbbf24;
      --danger-color: #f87171;
      --radius: 6px;
      --glow: 0 0 8px rgba(56, 189, 248, 0.4);
      --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.5), 0 2px 4px -1px rgba(0, 0, 0, 0.3);
    }

    * {
      box-sizing: border-box;
    }

    body {
      font-family: 'Exo 2', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg-color);
      background-image:
        linear-gradient(rgba(56, 189, 248, 0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(56, 189, 248, 0.02) 1px, transparent 1px);
      background-size: 40px 40px;
      /* Reduced grid noise */
      color: var(--text-color);
      line-height: 1.7;
      font-weight: 400;
      /* Increased from 300 for readability */
    }

    /* Sidebar Styling */
    .sidebar {
      background: rgba(15, 17, 26, 0.95) !important;
      backdrop-filter: blur(10px);
      border-right: 1px solid var(--border-color);
      padding: 0 !important;
      overflow-y: auto !important;
      box-shadow: 2px 0 15px rgba(0, 0, 0, 0.5);
    }

    .sidebar>h1 {
      padding: 30px 25px 20px !important;
      margin: 0 !important;
      font-family: 'Rajdhani', sans-serif !important;
      color: var(--theme-color) !important;
      text-shadow: var(--glow);
      font-size: 34px !important;
      font-weight: 700 !important;
      letter-spacing: 1.5px;
      text-transform: uppercase;
    }

    .sidebar>h1 a {
      color: var(--theme-color) !important;
      text-decoration: none !important;
    }

    .sidebar-nav {
      padding: 10px 0 30px !important;
    }

    .sidebar-nav>ul>li>a {
      color: #cbd5e0 !important;
      /* Brighter sidebar top-level links */
      font-weight: 600 !important;
      font-size: 15px !important;
      text-transform: uppercase !important;
      letter-spacing: 1.2px !important;
      padding: 10px 20px !important;
      transition: all 0.3s ease !important;
      border-left: 3px solid transparent;
    }

    .sidebar-nav>ul>li>a:hover,
    .sidebar-nav>ul>li.active>a {
      background: linear-gradient(90deg, var(--theme-color-light) 0%, transparent 100%) !important;
      color: var(--theme-color) !important;
      text-shadow: 0 0 5px var(--theme-color);
      border-left-color: var(--theme-color);
    }

    .sidebar-nav ul ul a {
      color: #94a3b8 !important;
      font-size: 14px !important;
      font-weight: 500 !important;
      text-transform: none !important;
      letter-spacing: 0.5px !important;
    }

    .sidebar-nav ul ul a:hover {
      color: #e2e8f0 !important;
      text-shadow: 0 0 8px rgba(255, 255, 255, 0.3);
    }

    /* Main Content */
    .markdown-section {
      padding: 40px 60px !important;
      max-width: 900px !important;
      color: var(--text-color) !important;
    }

    .markdown-section h1,
    .markdown-section h2,
    .markdown-section h3,
    .markdown-section h4 {
      font-family: 'Rajdhani', sans-serif !important;
      text-transform: uppercase;
      color: var(--heading-color) !important;
    }

    .markdown-section h1 {
      font-size: 46px !important;
      font-weight: 700 !important;
      color: var(--heading-color) !important;
      text-shadow: var(--glow);
      margin-bottom: 30px !important;
      padding-bottom: 15px !important;
      border-bottom: 2px solid var(--border-color) !important;
      position: relative;
    }

    .markdown-section h1::after {
      content: '';
      position: absolute;
      bottom: -2px;
      left: 0;
      width: 150px;
      height: 2px;
      background: var(--theme-color);
      box-shadow: var(--glow);
    }

    .markdown-section h2 {
      font-size: 32px !important;
      font-weight: 600 !important;
      color: var(--theme-color) !important;
      margin-top: 60px !important;
      margin-bottom: 25px !important;
    }

    .markdown-section h3 {
      font-size: 24px !important;
      color: #f1f5f9 !important;
      /* Extremely readable subheading */
      margin-top: 40px !important;
    }

    .markdown-section p,
    .markdown-section li {
      font-size: 16px !important;
      color: var(--text-color) !important;
      /* Force readable text color */
      line-height: 1.8 !important;
      font-weight: 400 !important;
    }

    .markdown-section p {
      margin-bottom: 20px !important;
    }

    /* Code Blocks */
    .markdown-section pre {
      background: var(--code-bg) !important;
      border-radius: var(--radius) !important;
      padding: 20px !important;
      margin: 25px 0 !important;
      box-shadow: inset 0 0 15px rgba(0, 0, 0, 0.4), 0 0 10px rgba(56, 189, 248, 0.05) !important;
      border: 1px solid var(--border-color) !important;
      position: relative;
    }

    .markdown-section pre::before {
      content: '/>';
      position: absolute;
      top: 10px;
      right: 15px;
      color: var(--theme-color);
      font-family: 'JetBrains Mono', monospace;
      opacity: 0.4;
      font-size: 16px;
    }

    .markdown-section pre code {
      font-family: 'JetBrains Mono', 'Fira Code', monospace !important;
      font-size: 14px !important;
      color: #e2e8f0 !important;
      /* Brighter, high-contrast code text */
      line-height: 1.6 !important;
    }

    .markdown-section code {
      font-family: 'JetBrains Mono', monospace !important;
      font-size: 14px !important;
      background: rgba(56, 189, 248, 0.15) !important;
      /* Softer tag background */
      color: #38bdf8 !important;
      /* Extremely readable inline code color */
      padding: 3px 8px !important;
      border-radius: 3px !important;
      border: 1px solid rgba(56, 189, 248, 0.3);
    }

    /* Tables */
    .markdown-section table {
      width: 100% !important;
      border-collapse: collapse !important;
      margin: 30px 0 !important;
      background: rgba(15, 17, 26, 0.8) !important;
      border: 1px solid var(--border-color);
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.3);
    }

    .markdown-section tr {
      background-color: transparent !important;
    }

    .markdown-section tr:nth-child(2n) {
      background-color: rgba(0, 0, 0, 0.2) !important;
    }

    .markdown-section th {
      background: rgba(56, 189, 248, 0.1) !important;
      color: #f8fafc !important;
      /* Ultra-bright header text */
      font-family: 'Rajdhani', sans-serif !important;
      font-weight: 700 !important;
      padding: 15px 20px !important;
      text-align: left !important;
      font-size: 16px !important;
      text-transform: uppercase !important;
      letter-spacing: 1px !important;
      border-bottom: 2px solid var(--border-color) !important;
    }

    .markdown-section td {
      padding: 14px 20px !important;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05) !important;
      font-size: 15px !important;
      color: #e2e8f0 !important;
      /* Bright, highly readable cell text */
    }

    .markdown-section tr:hover td {
      background: rgba(56, 189, 248, 0.08) !important;
    }

    /* Blockquotes */
    .markdown-section blockquote {
      border-left: 4px solid var(--theme-color) !important;
      background: linear-gradient(90deg, var(--theme-color-light) 0%, transparent 100%) !important;
      margin: 25px 0 !important;
      padding: 15px 25px !important;
      border-radius: 0 !important;
      box-shadow: inset 0 0 10px rgba(0, 0, 0, 0.1) !important;
    }

    .markdown-section blockquote p {
      margin: 0 !important;
      color: #f1f5f9 !important;
      /* Extremely high contrast for callouts */
      font-style: italic;
      font-weight: 500 !important;
    }

    /* Links */
    .markdown-section a {
      color: #38bdf8 !important;
      /* More readable link color */
      text-decoration: none !important;
      position: relative;
      transition: all 0.2s ease !important;
    }

    .markdown-section a:hover {
      text-shadow: var(--glow);
      color: #7dd3fc !important;
      /* Lighter hover color */
    }

    /* Search Box */
    .search {
      padding: 20px !important;
      border-bottom: 1px solid var(--border-color) !important;
      background: rgba(15, 17, 26, 0.5) !important;
    }

    .search input {
      background: rgba(30, 36, 48, 0.8) !important;
      border: 1px solid rgba(56, 189, 248, 0.3) !important;
      border-radius: 4px !important;
      color: #f8fafc !important;
      /* Bright search input text */
      padding: 12px 15px !important;
      width: 100% !important;
      font-family: 'Exo 2', sans-serif;
      transition: all 0.3s ease;
    }

    .search input:focus {
      outline: none;
      box-shadow: var(--glow);
    }

    /* Pagination */
    .pagination-item a {
      background: transparent !important;
      border: 1px solid var(--border-color) !important;
      color: var(--text-color) !important;
      border-radius: 4px !important;
      transition: all 0.3s ease;
      font-family: 'Rajdhani', sans-serif !important;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .pagination-item a:hover {
      background: var(--theme-color-light) !important;
      color: var(--theme-color) !important;
      box-shadow: var(--glow);
    }

    /* Copy Code Button */
    .docsify-copy-code-button {
      background: transparent !important;
      border: 1px solid var(--theme-color) !important;
      color: var(--theme-color) !important;
      border-radius: 3px !important;
      font-family: 'Rajdhani', sans-serif !important;
      text-transform: uppercase;
      transition: all 0.2s ease;
      font-size: 12px !important;
      padding: 4px 8px !important;
    }

    .docsify-copy-code-button:hover {
      background: var(--theme-color) !important;
      color: #000 !important;
      box-shadow: var(--glow);
    }

    /* Scrollbar */
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }

    ::-webkit-scrollbar-track {
      background: var(--bg-color);
      border-left: 1px solid rgba(255, 255, 255, 0.05);
    }

    ::-webkit-scrollbar-thumb {
      background: var(--theme-color-dark);
      border-radius: 0;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: var(--theme-color);
      box-shadow: var(--glow);
    }

    /* GitHub Corner Customization */
    .github-corner svg {
      fill: var(--theme-color);
      color: var(--bg-color);
      filter: drop-shadow(0 0 5px var(--theme-color));
    }

    .github-corner:hover .octo-arm {
      animation: octocat-wave 560ms ease-in-out;
    }
  </style>
</head>

<body>
  <div id="app">Loading...</div>
  <script>
    window.$docsify = {
      name: 'mesh',
      repo: 'https://github.com/azghr/mesh',
      loadSidebar: true,
      subMaxLevel: 3,
      auto2top: true,
      search: {
        maxAge: 86400000,
        paths: 'auto',
        placeholder: 'Search docs...',
        noData: 'No results found!',
        depth: 3
      },
      copyCode: {
        buttonText: '📋 Copy',
        errorText: 'Error',
        successText: 'Copied!'
      },
      pagination: {
        previousText: '← Previous',
        nextText: 'Next →',
        crossChapter: true
      },
      notFoundPage: {
        title: 'Page Not Found',
        content: '# 404\n\nThe page you\'re looking for doesn\'t exist.',
        style: 'flat'
      }
    }
  </script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/plugins/pagination.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-copy-code@2/dist/docsify-copy-code.min.js"></script>
</body>

</html>
